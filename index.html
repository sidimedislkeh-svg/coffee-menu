<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   
    <style>
        .container {
            display: flex;
            gap:20px;
            justify-content: center;
        }
        .card {
            width:280px;
            text-align:center;
            background-color:white;
            padding:20px;
            border-radius:10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }
        .card a {
            display: inline-block;
            margin-top: 10px;
            padding: 10px;
            background-color: blueviolet;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
        }
        .card a:hover {
            transform:scale(1.05) translateY(-5px);
              background-color: #8b5e3c;
        }
        .card img {
            width: 100%;
            border-radius: 10px;
            margin-bottom:10px;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
        }
        body {
            background-color: #f5f5f5;
        }
        @media (max-width: 600px) {
            .container {
                flex-direction: column;
                align-items: center;
            }
            .card {
                width: 90%;
            }
        }

    </style>
    </head>
    <body>
        <h1>Coffee Menu</h1>
        <div class="container">
        <div class="card">
            <img src="cake.jpeg">
            <h2>japanese cheesecake</h2>
            <p>تضيز كيك ياباني خفيف وناعم</p>
            <span>180mru</span>
            <a href="#">أطلبي الان</a>
        </div>
        <div class="card">
            <img src="mvn.jpeg">
            <h2>coffee maffin</h2>
            <p>مافن القهوة</p>
            <span>80mru</span>
            <a hef="#">اطلب الان</a>
        </div>
        <div class="card">
            <img src="cup.jpeg">
            <h2>pancakes</h2>
            <p>كب كيك بلعسل</p>
            <span>150mru</span>
            <a href="#">اطلب الان</a>
        </div>
        </div>
    </body>
    </html>
